    <!-- Preconnect to Font and Image CDNs -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://i.ibb.co" />

    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.gstatic.com/s/montserrat/v25/JTUSjIg1_i6t8kCHKm459Wlhyw.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="https://fonts.gstatic.com/s/cormorantgaramond/v16/co3bmX5slCNuHLi8bLeY9MK7whWMhyjYpHtK.woff2" as="font" type="font/woff2" crossorigin />

    <!-- UTMify Script -->
    <script>
      // Fix for "Converting circular structure to JSON" and "Failed to fetch"
      // silences tracking script errors caused by AdBlock or React circular refs.
      (function() {
        // Intercept Fetch to avoid "Failed to fetch" console red noise for tracking
        const originalFetch = window.fetch;
        window.fetch = function(...args) {
          const url = typeof args[0] === 'string' ? args[0] : (args[0] instanceof URL ? args[0].href : (args[0] && args[0].url));
          return originalFetch.apply(this, args).catch(err => {
            const isTracking = url && (
              url.includes('utmify') || 
              url.includes('facebook') || 
              url.includes('google-analytics') ||
              url.includes('vimeo')
            );
            if (err.message === 'Failed to fetch' && isTracking) {
              console.warn('Silent Block/Failure for tracking:', url);
              return new Response('{}', { status: 200, statusText: 'OK', headers: { 'Content-Type': 'application/json' } });
            }
            throw err;
          });
        };

        const originalStringify = JSON.stringify;
        JSON.stringify = function(value, replacer, space) {
          const cache = new Set();
          try {
            return originalStringify(value, (key, val) => {
              if (val && typeof val === 'object') {
                if (cache.has(val)) return '[Circular]';
                if (val instanceof Node || (val.constructor && val.constructor.name.includes('HTML'))) {
                  return '[DOMElement]';
                }
                cache.add(val);
              }
              return replacer ? replacer(key, val) : val;
            }, space);
          } catch (err) {
            return '"[Serialization Error]"';
          }
        };
      })();
    </script>
    <script
      src="https://cdn.utmify.com.br/scripts/utms/latest.js"
      data-utmify-prevent-xcod-sck
      data-utmify-prevent-subids
      async
      defer
    ></script>
    <!-- End UTMify Script -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
